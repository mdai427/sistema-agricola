version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    container_name: agricola_db
    environment:
      POSTGRES_USER: agricola
      POSTGRES_PASSWORD: agricola123
      POSTGRES_DB: sistema_agricola
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agricola_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
